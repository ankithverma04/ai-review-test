name: 🤖 AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    uses: ankithverma04/ai-review-central/.github/workflows/reusable_ai_review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      repo: ${{ github.repository }}
    secrets:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
